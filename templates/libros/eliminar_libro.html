{% extends 'base.html' %}

{% block title %}Eliminar Libro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4><i class="fas fa-trash"></i> Confirmar Eliminación</h4>
            </div>
            <div class="card-body">
                <p>¿Estás seguro que deseas eliminar el libro?</p>
                <div class="alert alert-warning">
                    <strong>{{ libro.titulo }}</strong><br>
                    ISBN: {{ libro.isbn }}<br>
                    Autores: {{ libro.autores_lista }}
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'lista_libros' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash"></i> Sí, eliminar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
